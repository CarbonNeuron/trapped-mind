---
- name: Clone trapped-mind repository
  git:
    repo: "{{ repo_url }}"
    dest: "{{ app_dir }}"
    version: master
  notify: restart-app

- name: Build trapped-mind
  command: dotnet build -c Release
  args:
    chdir: "{{ app_dir }}"
  notify: restart-app

- name: Deploy bash_profile for auto-launch on tty1
  become_user: "{{ kiosk_user }}"
  template:
    src: bash_profile.j2
    dest: "/home/{{ kiosk_user }}/.bash_profile"
    mode: "0644"
  notify: restart-app

- name: Deploy update script
  template:
    src: trapped-mind-update.sh.j2
    dest: /usr/local/bin/trapped-mind-update.sh
    mode: "0755"

- name: Deploy update service
  copy:
    src: trapped-mind-update.service
    dest: /etc/systemd/system/trapped-mind-update.service
  notify: reload-systemd

- name: Deploy update timer
  copy:
    src: trapped-mind-update.timer
    dest: /etc/systemd/system/trapped-mind-update.timer
  notify: reload-systemd

- name: Enable and start update timer
  systemd:
    name: trapped-mind-update.timer
    enabled: true
    state: started
