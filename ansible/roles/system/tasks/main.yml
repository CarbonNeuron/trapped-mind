---
- name: Remove cowsay to prevent ansible from using it
  apt:
    name: cowsay
    state: absent

- name: Set timezone to America/Chicago
  community.general.timezone:
    name: America/Chicago

- name: Install system packages
  apt:
    name:
      - lm-sensors
      - avahi-daemon
      - cage
      - foot
      - fonts-firacode
      - fonts-noto
      - acl
      - ansible
      - git
      - systemd-timesyncd
    state: present
    update_cache: true

- name: Enable and start systemd-timesyncd (NTP)
  systemd:
    name: systemd-timesyncd
    enabled: true
    state: started

- name: Configure NTP servers
  copy:
    content: |
      [Time]
      NTP=0.pool.ntp.org 1.pool.ntp.org 2.pool.ntp.org 3.pool.ntp.org
      FallbackNTP=ntp.ubuntu.com
    dest: /etc/systemd/timesyncd.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart-timesyncd

- name: Enable and start avahi-daemon
  systemd:
    name: avahi-daemon
    enabled: true
    state: started

- name: Create kiosk user
  user:
    name: "{{ kiosk_user }}"
    system: false
    create_home: true
    shell: /bin/bash
    password: "!"
    groups: []

- name: Configure console font
  copy:
    src: console-setup
    dest: /etc/default/console-setup
    owner: root
    group: root
    mode: "0644"
  notify: update-console-setup

- name: Create foot config directory
  become_user: "{{ kiosk_user }}"
  file:
    path: "/home/{{ kiosk_user }}/.config/foot"
    state: directory

- name: Deploy foot config
  become_user: "{{ kiosk_user }}"
  copy:
    src: foot.ini
    dest: "/home/{{ kiosk_user }}/.config/foot/foot.ini"
    mode: "0644"

- name: Set up auto-login on tty1
  file:
    path: /etc/systemd/system/getty@tty1.service.d
    state: directory

- name: Configure auto-login override
  copy:
    content: |
      [Service]
      ExecStart=
      ExecStart=-/sbin/agetty --autologin {{ kiosk_user }} --noclear %I $TERM
    dest: /etc/systemd/system/getty@tty1.service.d/override.conf
  notify: reload-systemd
