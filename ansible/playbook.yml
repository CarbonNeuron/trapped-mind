---
- name: Provision TrappedMind laptop
  hosts: all
  become: true
  vars:
    app_user: carbon
    kiosk_user: kiosk
    app_dir: "/etc/trapped-mind"
    repo_url: "https://github.com/carbonneuron/trapped-mind.git"

  roles:
    - system
    - network
    - dotnet
    - ollama
    - trapped-mind
